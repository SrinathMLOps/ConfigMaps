# Application Configuration
app.name=MyKubernetesApp
app.version=1.0.0

# Database Configuration
db.host=prod-db.example.com
db.port=5432
db.name=myapp
db.pool.size=20

# API Configuration
api.url=https://api.company.com
api.timeout=30
api.retry.count=3

# Feature Flags
feature.new.ui=true
feature.payments=false
feature.analytics=true

# Logging
log.level=info
log.format=json

# Cache
cache.enabled=true
cache.ttl=3600
